<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日一言 · 宇宙赠言</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050510;
            font-family: "PingFang SC", "Noto Serif SC", "STSong", "Songti SC", Georgia, "Times New Roman", serif;
            padding: 20px;
            overflow-x: hidden;
            cursor: default;
        }

        /* ── 星空画布 ── */
        #starsCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        /* ── 星光尘埃 ── */
        .star-dust {
            position: fixed; pointer-events: none; z-index: 51;
            border-radius: 50%; background: #fff;
            animation: dustSettle var(--dust-dur) ease-out forwards;
        }
        @keyframes dustSettle {
            0%   { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--ddx), var(--ddy)) scale(0); }
        }

        /* ── 飘浮光点 ── */
        .floating-light {
            position: fixed; pointer-events: none; z-index: 52;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,240,210,1) 0%, rgba(255,200,130,0.6) 30%, transparent 70%);
            animation: floatUp var(--fl-dur) ease-out forwards;
            animation-delay: var(--fl-delay);
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { opacity: 0; transform: translate(0, 0) scale(0.3); }
            15%  { opacity: 0.9; }
            100% { opacity: 0; transform: translate(var(--fl-x), var(--fl-y)) scale(0); }
        }

        /* ── 回答星光 ── */
        .answer-spark {
            position: fixed; pointer-events: none; z-index: 53;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180,220,255,1) 0%, rgba(130,180,255,0.6) 30%, transparent 70%);
            animation: answerSpark var(--as-dur) ease-out forwards;
            animation-delay: var(--as-delay);
            opacity: 0;
        }
        @keyframes answerSpark {
            0%   { opacity: 0; transform: translate(0, 0) scale(0.2); }
            20%  { opacity: 0.85; }
            100% { opacity: 0; transform: translate(var(--as-x), var(--as-y)) scale(0); }
        }

        /* ═══════════════════════════════════
            整体布局 — 居中主卡片 + 右侧面板
           ═══════════════════════════════════ */
        .stage {
            position: relative; z-index: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 28px;
            width: 100%;
            max-width: 1000px;
        }

        /* ── 主卡片 ── */
        .container {
            flex: 0 0 auto;
            width: 580px;
            max-width: 100%;
            background: rgba(18, 18, 32, 0.45);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 56px 48px 48px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.02),
                0 40px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            transition: opacity 0.8s ease, transform 0.8s ease,
                        box-shadow 1.5s ease, border-color 0.8s ease,
                        background 0.8s ease;
            position: relative;
        }

        /* ── 卡片初始隐藏态 ── */
        .container.entering {
            opacity: 0;
            transform: translateY(30px) scale(0.94);
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* ── 卡片搜寻中：呼吸微动 + 边缘微光 ── */
        .container.searching-card {
            animation: cardBreathe 2s ease-in-out infinite;
            border-color: rgba(255, 255, 255, 0.12);
        }

        @keyframes cardBreathe {
            0%, 100% {
                box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.02),
                    0 0 40px rgba(200, 180, 255, 0.04),
                    0 40px 80px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(255, 255, 255, 0.02);
            }
            50% {
                box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.04),
                    0 0 80px rgba(200, 180, 255, 0.1),
                    0 40px 80px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
            }
        }

        /* ── 卡片被选中星照亮 ── */
        .container.illuminated {
            border-color: rgba(255, 220, 150, 0.2);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 120px rgba(255, 200, 120, 0.18),
                0 0 200px rgba(255, 180, 100, 0.06),
                0 40px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            background: rgba(22, 20, 36, 0.5);
        }

        /* ── 日期 ── */
        .date-row {
            display: flex; align-items: center; justify-content: center;
            gap: 16px; margin-bottom: 42px;
        }
        .date-dot {
            width: 4px; height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            transition: background 0.6s ease;
        }
        .date {
            font-size: 12px; color: rgba(255, 255, 255, 0.3);
            letter-spacing: 4px; font-family: inherit;
        }

        /* ── 语录区域 ── */
        .quote-stage {
            position: relative; min-height: 210px;
            display: flex; flex-direction: column;
            justify-content: center; margin-bottom: 20px;
        }
        .quote-mark {
            font-size: 90px; color: rgba(255, 255, 255, 0.025);
            font-family: Georgia, "Times New Roman", serif;
            line-height: 0; position: absolute;
            top: 10px; left: 50%; transform: translateX(-50%);
            pointer-events: none;
            transition: color 1s ease;
        }
        .quote-mark.glowing {
            color: rgba(255, 220, 150, 0.08);
        }
        .quote {
            font-size: 26px; line-height: 1.85;
            color: #e6e6e6;
            position: relative; z-index: 1;
            padding: 10px 0; letter-spacing: 0.5px;
            transition: opacity 0.6s ease, transform 0.6s ease,
                        color 1.2s ease, text-shadow 1.2s ease;
        }
        .quote.en {
            font-size: 24px;
            font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
            font-style: italic; line-height: 1.7;
        }
        .quote.glowing-text {
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 220, 150, 0.3),
                         0 0 80px rgba(255, 200, 100, 0.1);
        }
        .translation {
            font-size: 15px; color: rgba(255, 255, 255, 0.4);
            margin-top: 12px; line-height: 1.6;
            font-style: normal;
            font-family: "PingFang SC", "Noto Serif SC", "STSong", serif;
            transition: opacity 0.6s ease, transform 0.6s ease, color 1.2s ease;
        }
        .translation.glowing-text {
            color: rgba(255, 255, 255, 0.65);
            text-shadow: 0 0 20px rgba(255, 220, 150, 0.2);
        }
        .author {
            font-size: 15px; color: rgba(255, 255, 255, 0.42);
            margin-top: 16px; font-style: italic; letter-spacing: 1px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .source {
            font-size: 12px; color: rgba(255, 255, 255, 0.22);
            margin-top: 6px; letter-spacing: 2px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* ── 回答提示小字 ── */
        .answer-hint {
            font-size: 11px;
            color: rgba(180, 210, 255, 0.35);
            margin-top: 14px;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.9s ease, transform 0.9s ease, color 1.5s ease;
        }
        .answer-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        .song-recommend {
            font-size: 12px;
            color: rgba(200, 220, 255, 0.35);
            margin-top: 6px;
            letter-spacing: 1.5px;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.9s ease 0.3s, transform 0.9s ease 0.3s;
        }
        .song-recommend.show {
            opacity: 1;
            transform: translateY(0);
        }
        .song-recommend .song-name {
            color: rgba(220, 235, 255, 0.55);
            font-weight: 500;
        }

        /* ── 分隔线 ── */
        .divider-wrap {
            display: flex; align-items: center; justify-content: center;
            gap: 14px; margin: 28px 0 32px;
        }
        .divider-line {
            width: 40px; height: 1px;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.6s ease;
        }
        .divider-diamond {
            width: 5px; height: 5px;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            transition: background 0.6s ease, box-shadow 0.6s ease;
        }

        /* ── 按钮 ── */
        .btn-wrap { position: relative; display: inline-block; }
        .btn {
            position: relative;
            display: inline-flex; align-items: center; gap: 10px;
            padding: 15px 36px;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 15px; cursor: pointer;
            transition: all 0.5s ease;
            font-family: inherit; letter-spacing: 2px;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.06), transparent);
            opacity: 0; transition: opacity 0.5s ease;
        }
        .btn:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.03), 0 8px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: translateY(0); transition: transform 0.1s ease; }
        .btn.searching {
            pointer-events: none;
            color: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.04);
        }

        /* ── 涟漪 ── */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255, 220, 160, 0.12);
            transform: scale(0);
            animation: rippleOut 1.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleOut { to { transform: scale(4); opacity: 0; } }

        /* ── 底部 ── */
        .hint {
            margin-top: 28px; font-size: 11px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 3px;
            transition: color 0.6s ease;
        }

        /* ═══════════════════════════════════
            右侧提问面板
           ═══════════════════════════════════ */
        .question-panel {
            flex: 0 0 auto;
            width: 320px;
            max-width: 100%;
            background: rgba(18, 18, 32, 0.35);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 36px 30px 30px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.015),
                0 30px 60px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateX(40px);
            transition: opacity 1s ease, transform 1s ease,
                        box-shadow 0.8s ease, border-color 0.8s ease;
            align-self: flex-start;
            margin-top: 0;
        }

        .question-panel.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .question-panel.answering {
            border-color: rgba(150, 200, 255, 0.18);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 0 80px rgba(150, 190, 255, 0.1),
                0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .panel-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .panel-title .icon {
            font-size: 18px;
            display: inline-block;
            animation: iconFloat 2.5s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .question-input-wrap {
            position: relative;
            margin-bottom: 10px;
        }
        .question-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-family: inherit;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.4s ease;
            -webkit-appearance: none;
        }
        .question-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }
        .question-input:focus {
            border-color: rgba(180, 210, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 30px rgba(150, 190, 255, 0.06);
        }
        .question-input.searching-input {
            border-color: rgba(180, 210, 255, 0.25);
            background: rgba(200, 220, 255, 0.05);
            animation: inputPulse 1.5s ease-in-out infinite;
        }
        @keyframes inputPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(150, 190, 255, 0.04); }
            50% { box-shadow: 0 0 30px rgba(150, 190, 255, 0.12); }
        }

        .input-underline {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(150, 200, 255, 0.4), transparent);
            margin: 0 auto;
            transition: width 0.6s ease;
        }
        .input-underline.active {
            width: 80%;
        }

        .input-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* ── 歌曲推荐区域 ── */
        .song-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .song-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1.5px;
            transition: all 0.4s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .song-btn:hover {
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(200, 210, 255, 0.25);
            background: rgba(200, 210, 255, 0.05);
            box-shadow: 0 0 30px rgba(150, 190, 255, 0.06);
            transform: translateY(-1px);
        }
        .song-btn:active {
            transform: translateY(0);
            transition: transform 0.1s ease;
        }
        .song-btn.searching-btn {
            pointer-events: none;
            color: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.04);
        }

        .song-result {
            margin-top: 14px;
            font-size: 12px;
            color: rgba(200, 220, 255, 0.3);
            letter-spacing: 1px;
            line-height: 1.7;
            min-height: 20px;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.8s ease, transform 0.8s ease, color 0.6s ease;
        }
        .song-result.show {
            opacity: 1;
            transform: translateY(0);
            color: rgba(200, 220, 255, 0.5);
        }
        .song-result .song-name {
            color: rgba(220, 235, 255, 0.6);
            font-weight: 500;
            font-size: 13px;
        }

        /* ── 歌曲小涟漪 ── */
        .song-ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(180, 200, 255, 0.1);
            transform: scale(0);
            animation: songRippleOut 0.7s ease-out forwards;
            pointer-events: none;
        }
        @keyframes songRippleOut {
            to { transform: scale(3); opacity: 0; }
        }

        /* ── 响应式：窄屏时堆叠 ── */
        @media (max-width: 960px) {
            .stage {
                flex-direction: column;
                align-items: center;
                gap: 24px;
            }
            .container {
                width: 100%;
            }
            .question-panel {
                width: 100%;
                transform: translateY(30px);
                opacity: 0;
            }
            .question-panel.visible {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .container { padding: 44px 28px 36px; border-radius: 22px; }
            .quote { font-size: 21px; }
            .quote.en { font-size: 19px; }
            .translation { font-size: 13px; }
            .quote-mark { font-size: 60px; }
            .date { font-size: 11px; letter-spacing: 3px; }
            .question-panel { padding: 28px 24px 24px; border-radius: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="starsCanvas"></canvas>

    <div class="stage" id="stage">
        <!-- 主卡片 -->
        <div class="container entering" id="card">
            <div class="date-row">
                <span class="date-dot"></span>
                <span class="date" id="date"></span>
                <span class="date-dot"></span>
            </div>

            <div class="quote-stage" id="quoteStage">
                <span class="quote-mark" id="quoteMark">"</span>
                <p class="quote" id="quote"></p>
                <p class="translation" id="translation"></p>
                <p class="author" id="author"></p>
                <p class="source" id="source"></p>
                <p class="answer-hint" id="answerHint"></p>
            </div>

            <div class="divider-wrap">
                <span class="divider-line" id="divLineL"></span>
                <span class="divider-diamond" id="divDiamond"></span>
                <span class="divider-line" id="divLineR"></span>
            </div>

            <div class="btn-wrap">
                <button class="btn" id="refreshBtn">✦ 宇宙赠言</button>
            </div>

            <p class="hint" id="hintBottom">星辰为墨 · 岁月为笺</p>
        </div>

        <!-- 右侧提问面板 -->
        <div class="question-panel" id="questionPanel">
            <div class="panel-title">
                <span class="icon">🌙</span> 今日疑问
            </div>
            <div class="question-input-wrap">
                <input
                    type="text"
                    class="question-input"
                    id="questionInput"
                    placeholder="写下你心中的困惑..."
                    maxlength="80"
                />
            </div>
            <div class="input-underline" id="inputUnderline"></div>
            <p class="input-hint">按回车 · 向宇宙发问</p>

            <!-- 歌曲推荐区 -->
            <div class="song-section">
                <button class="song-btn" id="songBtn">
                    🎧 星辰荐歌
                </button>
                <div class="song-result" id="songResult"></div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════
        //  语录库 + 关键词标签
        // ═══════════════════════════════════
        const quotes = [
            { text: "The only true wisdom is in knowing you know nothing.", translation: "唯一真正的智慧，是知道自己一无所知。", author: "Socrates", source: "", lang: "en",
              tags: ["知识", "智慧", "谦虚", "学习", "无知", "聪明", "成长"] },
            { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", translation: "我们重复做什么，就会成为什么。卓越不是一种行为，而是一种习惯。", author: "Aristotle", source: "", lang: "en",
              tags: ["习惯", "坚持", "努力", "卓越", "行动", "自律", "改变"] },
            { text: "He who has a why to live for can bear almost any how.", translation: "一个人知道自己为何而活，就可以忍受几乎任何一种生活。", author: "Friedrich Nietzsche", source: "Twilight of the Idols", lang: "en",
              tags: ["意义", "人生", "痛苦", "坚持", "目标", "活着", "忍受", "苦难", "价值"] },
            { text: "The unexamined life is not worth living.", translation: "未经审视的人生不值得过。", author: "Socrates", source: "", lang: "en",
              tags: ["人生", "思考", "自省", "意义", "审视", "活着", "反思"] },
            { text: "In the middle of difficulty lies opportunity.", translation: "困难之中，藏有机遇。", author: "Albert Einstein", source: "", lang: "en",
              tags: ["困难", "机会", "希望", "逆境", "挑战", "挫折", "危机"] },
            { text: "Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.", translation: "我们听到的一切都是观点，不是事实。我们看到的一切都是视角，不是真相。", author: "Marcus Aurelius", source: "Meditations", lang: "en",
              tags: ["真相", "观点", "视角", "认知", "事实", "思考", "偏见"] },
            { text: "You are what you love, not who loves you.", translation: "你由你所爱定义，而非被爱所困。", author: "Charlie Kaufman", source: "", lang: "en",
              tags: ["爱", "自我", "自由", "定义", "爱情", "独立", "关系"] },
            { text: "It is not that we have a short time to live, but that we waste a lot of it.", translation: "不是因为生命短暂，而是因为我们浪费了太多。", author: "Seneca", source: "On the Shortness of Life", lang: "en",
              tags: ["时间", "生命", "珍惜", "浪费", "人生", "意义"] },
            { text: "The mind is everything. What you think, you become.", translation: "心即一切。你想什么，就成为什么。", author: "Buddha", source: "", lang: "en",

            { text: "We suffer more in imagination than in reality.", translation: "我们在想象中承受的痛苦，远比现实中更多。", author: "Seneca", source: "", lang: "en",

        // ═══════════════════════════════════
        //  星空画布
        // ═══════════════════════════════════
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        const card = document.getElementById('card');
        let starsArr = [];
        let shootingStars = [];
        let time = 0;
        let canvasW, canvasH;

        let searchPhase = 'idle';
        let searchStart = 0;
        let chosenStarIndex = -1;
        let convergeTarget = { x: 0, y: 0 };

        function resizeCanvas() {
            canvasW = canvas.width = window.innerWidth;
            canvasH = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas(); initStarsArr(); });

        function initStarsArr() {
            starsArr = [];
            const count = Math.floor((canvasW * canvasH) / 1500);
            for (let i = 0; i < count; i++) {
                starsArr.push({
                    homeX: Math.random() * canvasW,
                    homeY: Math.random() * canvasH,
                    x: 0, y: 0,
                    r: Math.random() * 1.5 + 0.3,
                    baseAlpha: Math.random() * 0.5 + 0.15,
                    alpha: 0,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.008 + 0.004,
                    twinkleAmt: Math.random() * 0.4 + 0.2,
                    driftX: 0, driftY: 0,
                    convergeStrength: 0,
                });
            }
            for (const s of starsArr) { s.x = s.homeX; s.y = s.homeY; }
        }

        function getCardCenter() {
            const rect = card.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function drawStarsFrame() {
            ctx.clearRect(0, 0, canvasW, canvasH);
            time += 0.016;
            const now = performance.now();

            for (let i = 0; i < starsArr.length; i++) {
                const s = starsArr[i];
                let tx = s.homeX;
                let ty = s.homeY;

                if (searchPhase === 'converging') {
                    const elapsed = (now - searchStart) / 2800;
                    const t = Math.min(elapsed / 0.5, 1);
                    const ease = 1 - Math.pow(1 - t, 3);
                    const dx = convergeTarget.x - s.homeX;
                    const dy = convergeTarget.y - s.homeY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = Math.max(canvasW, canvasH);
                    const proximity = 1 - Math.min(dist / maxDist, 1);
                    if (proximity > 0.15) {
                        const strength = ease * (0.15 + proximity * 0.85);
                        tx = s.homeX + dx * strength;
                        ty = s.homeY + dy * strength;
                        s.convergeStrength = strength;
                    }
                } else if (searchPhase === 'settling' || searchPhase === 'idle') {
                    if (s.convergeStrength > 0.001) {
                        s.convergeStrength *= 0.94;
                        tx = s.homeX + (tx - s.homeX) * 0.94;
                        ty = s.homeY + (ty - s.homeY) * 0.94;
                    } else {
                        s.convergeStrength = 0;
                        tx = s.homeX; ty = s.homeY;
                    }
                }

                s.x += (tx - s.x) * 0.08;
                s.y += (ty - s.y) * 0.08;

                let brightness = s.baseAlpha + Math.sin(time * s.speed * 60 + s.phase) * s.twinkleAmt;
                if (searchPhase === 'converging' || s.convergeStrength > 0.01) {
                    brightness += s.convergeStrength * 0.5;
                }
                brightness = Math.max(0.03, Math.min(0.95, brightness));

                // 颜色随汇聚变暖
                const r = 220 - s.convergeStrength * 40;
                const g = 220 - s.convergeStrength * 20;
                const b = 255 - s.convergeStrength * 55;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${brightness})`;
                ctx.fill();

                if (brightness > 0.5 && s.r > 0.7) {
                    const glowR = s.r * (2 + s.convergeStrength * 4);
                    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowR);
                    glow.addColorStop(0, `rgba(255,${220 - s.convergeStrength * 30},${180 - s.convergeStrength * 50},${brightness * 0.18})`);
                    glow.addColorStop(1, 'rgba(255,200,100,0)');
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2);
                    ctx.fillStyle = glow;
                    ctx.fill();
                }
            }

            // 流星
            const dnow = Date.now();
            shootingStars = shootingStars.filter(ss => dnow - ss.born < 1200);
            for (const ss of shootingStars) {
                const age = (dnow - ss.born) / 1200;
                const sx = ss.x - age * 500;
                const sy = ss.y + age * 300;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx - 80 * (1 - age), sy + 50 * (1 - age));
                ctx.strokeStyle = `rgba(255,255,255,${(1 - age) * 0.4})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${(1 - age) * 0.6})`;
                ctx.fill();
            }

            if (searchPhase === 'converging') {
                const elapsed = (now - searchStart) / 2800;
                const t = Math.min(elapsed / 0.5, 1);
                const easedT = 1 - Math.pow(1 - t, 3);
                if (easedT > 0.25) {
                    const lineAlpha = (easedT - 0.25) * 0.2;
                    const cx = convergeTarget.x;
                    const cy = convergeTarget.y;
                    const lines = 6;
                    for (let l = 0; l < lines; l++) {
                        const si = Math.floor((starsArr.length / lines) * l + Math.sin(time * 3 + l) * 15);
                        const s = starsArr[Math.abs(si) % starsArr.length];
                        if (s.convergeStrength > 0.45) {
                            ctx.beginPath();
                            ctx.moveTo(s.x, s.y);
                            ctx.lineTo(cx, cy);
                            ctx.strokeStyle = `rgba(255,220,180,${lineAlpha * s.convergeStrength})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            requestAnimationFrame(drawStarsFrame);
        }

        function spawnShootingStar() {
            shootingStars.push({
                x: Math.random() * canvasW * 0.8 + canvasW * 0.1,
                y: Math.random() * canvasH * 0.35,
                born: Date.now()
            });
        }

        initStarsArr();
        drawStarsFrame();

        setInterval(() => { if (Math.random() < 0.35 && searchPhase === 'idle') spawnShootingStar(); }, 9000);
        setTimeout(spawnShootingStar, 2500);

        // ═══════════════════════════════════
        //  星空尘埃 / 光点 工具函数
        // ═══════════════════════════════════

        // ═══════════════════════════════════
        //  日期
        // ═══════════════════════════════════
        function formatDate() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            const wd = ['日', '一', '二', '三', '四', '五', '六'][today.getDay()];
            return `${y} · ${m} · ${d}  星期${wd}`;
        }
        document.getElementById('date').textContent = formatDate();

        // ═══════════════════════════════════
        //  每日固定索引
        // ═══════════════════════════════════
        function getDailyIndex() {
            const today = new Date();
            const d = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            let h = 0;
            for (let i = 0; i < d.length; i++) { h = ((h << 5) - h) + d.charCodeAt(i); h |= 0; }
            return Math.abs(h) % quotes.length;
        }

        // ═══════════════════════════════════
        //  关键词匹配：从用户问题匹配语录
        // ═══════════════════════════════════
        function matchQuote(question) {
            const qLower = question.toLowerCase().trim();
            if (!qLower) return Math.floor(Math.random() * quotes.length);

            // 扩展关键词映射
            const keywordMap = {
                '爱': ['爱', '爱情', '感情', '喜欢', '关系'],
                '工作': ['工作', '事业', '行动', '坚持', '努力', '卓越', '习惯'],
                '迷茫': ['迷茫', '困惑', '方向', '人生', '意义', '未来', '视野'],
                '焦虑': ['焦虑', '担忧', '恐惧', '烦恼', '情绪', '内心', '平静', '当下', '痛苦'],
                '孤独': ['孤独', '寂寞', '归属', '心安', '家'],
                '失败': ['失败', '挫折', '困难', '困境', '不完美', '裂痕', '逆境', '希望'],
                '改变': ['改变', '成长', '进步', '习惯', '自律', '开始'],
                '时间': ['时间', '生命', '珍惜', '浪费', '人生'],
                '知识': ['知识', '智慧', '学习', '无知', '谦虚', '成长'],
                '人生': ['人生', '意义', '活着', '价值', '目标', '审视', '反思'],
                '内心': ['内心', '心', '平静', '情绪', '掌控', '信念', '思想', '自我'],
                '放下': ['放下', '过去', '得失', '包容', '看淡', '从容', '豁达'],
                '简单': ['简单', '简约', '生活', '极简', '纯粹'],
                '行动': ['行动', '实践', '努力', '坚持', '开始', '自律'],
                '自我': ['自我', '独立', '自由', '定义', '认识', '自知'],
                '希望': ['希望', '光明', '未来', '改变', '机会', '困难'],
                '关系': ['关系', '爱', '包容', '宽容', '接纳'],
                '认知': ['认知', '视角', '真相', '观点', '事实', '偏见'],
                '痛苦': ['痛苦', '忍受', '苦难', '焦虑', '担忧', '恐惧'],
                '力量': ['力量', '强大', '勇气', '内心', '掌控'],
                '格局': ['格局', '眼界', '高度', '气度', '视野', '心胸'],
                '当下': ['当下', '现在', '此刻', '专注', '焦虑', '过去', '未来'],
                '慢': ['行动', '坚持', '努力', '开始'],
                '担心': ['焦虑', '担忧', '恐惧', '内心', '平静'],
                '害怕': ['恐惧', '焦虑', '担忧', '勇气', '力量'],
            };

            // 提取问题中的关键词
            let matchedKeywords = new Set();
            for (const [primary, synonyms] of Object.entries(keywordMap)) {
                for (const syn of synonyms) {
                    if (qLower.includes(syn)) {
                        matchedKeywords.add(primary);
                        break;
                    }
                }
            }

            // 如果没有匹配到任何关键词，随机选一个
            if (matchedKeywords.size === 0) {
                // 尝试模糊匹配——检查是否有任何语录tag出现在问题中
                let bestScore = -1;
                let bestIndex = 0;
                for (let i = 0; i < quotes.length; i++) {
                    let score = 0;
                    for (const tag of quotes[i].tags) {
                        if (qLower.includes(tag.toLowerCase())) {
                            score += 2;
                        }
                        // 部分匹配
                        for (let j = 0; j < tag.length - 1; j++) {
                            const sub = tag.substring(j, Math.min(j + 3, tag.length));
                            if (sub.length >= 2 && qLower.includes(sub.toLowerCase())) {
                                score += 0.5;
                            }
                        }
                    }
                    if (score > bestScore) {
                        bestScore = score;
                        bestIndex = i;
                    }
                }
                return bestScore > 0.5 ? bestIndex : Math.floor(Math.random() * quotes.length);
            }

            // 对所有语录按匹配关键词数量打分
            let scored = quotes.map((q, i) => {
                let score = 0;
                for (const kw of matchedKeywords) {
                    const synonyms = keywordMap[kw] || [kw];
                    for (const tag of q.tags) {
                        if (synonyms.includes(tag)) score += 3;
                        // 部分匹配也加分
                        for (const syn of synonyms) {
                            if (tag.includes(syn) || syn.includes(tag)) score += 1.5;
                        }
                    }
                }
                return { index: i, score };
            });

            scored.sort((a, b) => b.score - a.score);

            // 如果最高分太低，也随机选
            if (scored[0].score < 2) {
                return Math.floor(Math.random() * quotes.length);
            }

            // 从得分最高的前几个中随机选一个
            const topN = scored.filter(s => s.score >= scored[0].score * 0.7);
            return topN[Math.floor(Math.random() * topN.length)].index;
        }

            const seed = Date.now() % 10000 + question.length * 7;

            let scored = songs.map((s, i) => {
                let score = 0;
                for (const tag of s.tags) {
                    if (q.includes(tag)) score += 3;
                    for (let j = 0; j < tag.length - 1; j++) {
                        const sub = tag.substring(j, Math.min(j + 2, tag.length));
                        if (sub.length >= 2 && q.includes(sub.toLowerCase())) score += 1;
                    }
                }
                // 模糊关联
                const extraHints = {
                    '怎么办': ['坚持', '力量', '改变'], '为什么': ['人生', '意义'],
                    '想不通': ['迷茫', '方向'], '累了': ['平静', '治愈', '放下'],

                    '好累': ['力量', '希望'],

                    if (q.includes(kw)) {
                        for (const e of extras) if (s.tags.includes(e)) score += 2;
                    }
                }
                // 少量随机因子增加多样性
                const rng = ((seed * (i + 1) * 31 + i * 17) % 100) / 100;
                return { index: i, score: score + rng * 0.8 };
            });

            scored.sort((a, b) => b.score - a.score);

            const ri = Math.floor(Math.random() * pool.length);
            return songs[pool[ri].index];

        function entranceAnimation() {

        //  ●●● 主仪式：星海寻言 ●●●
        // ═══════════════════════════════════
        btn.addEventListener('click', function(e) {
            if (isAnimating) return;
            isAnimating = true;
            answerHint.classList.remove('show');
            answerHint.textContent = '';

            const btnRect = btn.getBoundingClientRect();
            const btnCX = btnRect.left + btnRect.width / 2;
            const btnCY = btnRect.top + btnRect.height / 2;
            const cardCenter = getCardCenter();

            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * quotes.length);
            } while (quotes.length > 1 && newIndex === getDailyIndex() && Math.random() > 0.25);
            lastAnswerIndex = newIndex;

            // ── 涟漪 ──
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = Math.max(btnRect.width, btnRect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - btnRect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - btnRect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1600);

            // ── 星光特效音 ──
            playSparkle();

            // ── 卡片开始搜寻呼吸动画 ──
            btn.classList.add('searching');
            btn.textContent = '✦ 正在搜寻...';
            card.classList.add('searching-card');

            // ── 星空汇聚 ──
            searchPhase = 'converging';
            searchStart = performance.now();
            convergeTarget = cardCenter;

            // 文字淡出
            [quoteEl, transEl, authorEl, sourceEl].forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(8px)';
                el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            });
            quoteMark.classList.remove('glowing');
            card.classList.remove('illuminated');
            divLineL.style.background = 'rgba(255,255,255,0.03)';
            divLineR.style.background = 'rgba(255,255,255,0.03)';
            divDiamond.style.background = 'rgba(255,255,255,0.06)';
            hintBottom.style.color = 'rgba(255,255,255,0.05)';

            // 选中星
            let bestStar = 0;
            let bestDist = Infinity;
            for (let i = 0; i < starsArr.length; i++) {
                const dx = starsArr[i].homeX - cardCenter.x;
                const dy = starsArr[i].homeY - cardCenter.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const cardW = card.getBoundingClientRect().width;
                if (dist < cardW && dist < bestDist) { bestDist = dist; bestStar = i; }
            }
            chosenStarIndex = bestStar;

            // ── Phase 2: 选中星绽放 ──
            setTimeout(() => {
                searchPhase = 'chosen';
                card.classList.remove('searching-card');

                const cs = starsArr[chosenStarIndex];
                const sx = cs ? cs.x : cardCenter.x;
                const sy = cs ? cs.y : cardCenter.y;

                spawnFloatingLights(btnCX, btnCY, cardCenter.x, cardCenter.y);
                spawnStarDust(sx, sy);

                        sourceEl.style.opacity = '1';
                        sourceEl.style.transform = 'translateY(0)';

                    setTimeout(() => {
                        quoteEl.classList.remove('glowing-text');
                        transEl.classList.remove('glowing-text');
                    }, 2000);

                    setTimeout(() => {
                        searchPhase = 'settling';
                        card.classList.remove('illuminated');
                        quoteMark.classList.remove('glowing');
                        divLineL.style.background = 'rgba(255,255,255,0.1)';
                        divLineR.style.background = 'rgba(255,255,255,0.1)';
                        divDiamond.style.background = 'rgba(255,255,255,0.2)';
                        hintBottom.style.color = 'rgba(255,255,255,0.12)';
                        btn.classList.remove('searching');
                        btn.textContent = '✦ 宇宙赠言';
                        isAnimating = false;
                        searchPhase = 'idle';

                        if (Math.random() < 0.3) setTimeout(spawnShootingStar, 400);
                    }, 600);

                }, 350);
            }, 1400);

        questionInput.addEventListener('focus', () => {

                inputUnderline.classList.remove('active');

        questionInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const question = questionInput.value.trim();
                if (!question || isAnimating) return;

                e.preventDefault();
                askUniverse(question);

        async function askUniverse(question) {
            isAnimating = true;
            answerHint.classList.remove('show');

            const inputRect = questionInput.getBoundingClientRect();
            const inputCX = inputRect.left + inputRect.width / 2;
            const inputCY = inputRect.top + inputRect.height / 2;

            const cardCenter = getCardCenter();

            // ── 输入框进入搜寻态 ──
            questionInput.classList.add('searching-input');
            questionPanel.classList.add('answering');
            questionInput.disabled = true;

            // ── 卡片开始呼吸 ──
            card.classList.add('searching-card');
            btn.classList.add('searching');
            btn.textContent = '✦ 宇宙聆听中...';

            // ── 提问音效 ──
            playDeepChime();

            searchPhase = 'converging';
            searchStart = performance.now();
            convergeTarget = cardCenter;

            // 文字淡出
            [quoteEl, transEl, authorEl, sourceEl].forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(8px)';
                el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            });
            quoteMark.classList.remove('glowing');
            card.classList.remove('illuminated');

            // ── 匹配 ──
            const matchIndex = matchQuote(question);
            lastAnswerIndex = matchIndex;

            // ── 模拟宇宙搜索延迟 ──
            await new Promise(r => setTimeout(r, 1800));

            // ── 星光从输入框飞向卡片 ──
            spawnFloatingLights(inputCX, inputCY, cardCenter.x, cardCenter.y, 30);

            // ── 在输入框处绽放蓝色尘埃 ──
            spawnStarDust(inputCX, inputCY, 25, '150,200,255');

            // ── 选中星位置绽放 ──
            let bestStar = 0;
            let bestDist = Infinity;
            for (let i = 0; i < starsArr.length; i++) {
                const dx = starsArr[i].homeX - cardCenter.x;
                const dy = starsArr[i].homeY - cardCenter.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const cardW = card.getBoundingClientRect().width;
                if (dist < cardW && dist < bestDist) { bestDist = dist; bestStar = i; }
            }
            const cs = starsArr[bestStar];
            spawnStarDust(cs ? cs.x : cardCenter.x, cs ? cs.y : cardCenter.y, 35, '150,200,255');

            // ── 卡片被蓝色照亮 ──
            card.classList.add('illuminated');
            card.classList.remove('searching-card');
            card.style.borderColor = 'rgba(150, 200, 255, 0.2)';
            card.style.boxShadow = `
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 120px rgba(150, 190, 255, 0.18),
                0 0 200px rgba(130, 170, 255, 0.06),
                0 40px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06)
            `;

            setTimeout(() => {
                // 文字区绽放蓝色星光
                spawnAnswerSparks(cardCenter.x, cardCenter.y);
                spawnStarDust(cardCenter.x, cardCenter.y, 20, '150,200,255');

                // ── 回答显现音效 ──
                playSparkle();

                setQuoteContent(matchIndex);
                quoteMark.classList.add('glowing');
                quoteMark.style.color = 'rgba(150, 210, 255, 0.1)';

                [quoteEl, transEl, authorEl, sourceEl].forEach(el => {
                    el.style.transition = 'opacity 0.9s ease, transform 0.9s ease, color 1.2s ease, text-shadow 1.2s ease';
                });

                // 淡入文字
                setTimeout(() => {
                    quoteEl.classList.add('glowing-text');
                    transEl.classList.add('glowing-text');
                    quoteEl.style.opacity = '1';
                    quoteEl.style.transform = 'translateY(0)';
                }, 150);

                setTimeout(() => {
                    if (transEl.style.display !== 'none') {
                        transEl.style.opacity = '1';
                        transEl.style.transform = 'translateY(0)';
                    }
                }, 400);

                setTimeout(() => {
                    authorEl.style.opacity = '1';
                    authorEl.style.transform = 'translateY(0)';
                    sourceEl.style.opacity = '1';
                    sourceEl.style.transform = 'translateY(0)';
                }, 700);

                // ── 显示回答提示 ──
                setTimeout(() => {
                    answerHint.textContent = '这是宇宙深处闪烁对你的回答';
                    answerHint.classList.add('show');
                }, 1000);

                // ── 恢复 ──
                setTimeout(() => {
                    searchPhase = 'settling';
                    card.classList.remove('illuminated');
                    card.style.borderColor = 'rgba(255, 255, 255, 0.06)';
                    card.style.boxShadow = `
                        0 0 0 1px rgba(255, 255, 255, 0.02),
                        0 40px 80px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02)
                    `;
                    quoteMark.classList.remove('glowing');
                    quoteMark.style.color = 'rgba(255, 255, 255, 0.025)';
                    divLineL.style.background = 'rgba(255,255,255,0.1)';
                    divLineR.style.background = 'rgba(255,255,255,0.1)';
                    divDiamond.style.background = 'rgba(255,255,255,0.2)';
                    hintBottom.style.color = 'rgba(255,255,255,0.12)';
                    btn.classList.remove('searching');
                    btn.textContent = '✦ 宇宙赠言';
                    questionInput.classList.remove('searching-input');
                    questionPanel.classList.remove('answering');
                    questionInput.disabled = false;
                    questionInput.value = '';
                    questionInput.focus();
                    inputUnderline.classList.add('active');
                    isAnimating = false;
                    searchPhase = 'idle';

                    if (Math.random() < 0.4) setTimeout(spawnShootingStar, 500);
                }, 800);

            }, 400);
        }

        // ═══════════════════════════════════
        //  键盘：空格→宇宙赠言，其他键→聚焦提问
        // ═══════════════════════════════════
        document.addEventListener('keydown', function(e) {
            // 如果焦点在输入框里，不拦截
            if (document.activeElement === questionInput) return;

            if (e.code === 'Space' && !isAnimating) {
                e.preventDefault();
                btn.click();
            }
            // 任意字母键聚焦到提问框
            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey && !isAnimating) {
                questionInput.focus();
            }
        });

        // ═══════════════════════════════════
        //  ●●● 宇宙之音 — 背景钢琴曲 ●●●
        // ═══════════════════════════════════
        let audioCtx = null;
        let musicGainNode = null;
        let musicPlaying = false;
        let bgMusic = null;
        let melodyTimer = null;

        // ── 钢琴音色：多泛音 + 真实 ADSR ──
        function pianoNote(freq, startTime, duration, velocity = 0.45) {
            if (!audioCtx) return;
            const t = startTime || audioCtx.currentTime;

            const harmonics = [
                { ratio: 1, amp: 1.0 },
                { ratio: 2, amp: 0.4 },
                { ratio: 3, amp: 0.18 },
                { ratio: 4, amp: 0.08 },
                { ratio: 5, amp: 0.04 },
                { ratio: 6, amp: 0.02 },
            ];

            for (const h of harmonics) {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq * h.ratio;
                osc.detune.value = (Math.random() - 0.5) * 5;

                const gain = audioCtx.createGain();
                const peak = h.amp * velocity * 0.13;

                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(peak, t + 0.006);
                gain.gain.exponentialRampToValueAtTime(peak * 0.45, t + 0.12);
                gain.gain.exponentialRampToValueAtTime(peak * 0.12, t + duration * 0.6);
                gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

                osc.connect(gain);
                gain.connect(musicGainNode || audioCtx.destination);
                osc.start(t);
                osc.stop(t + duration + 0.5);
            }
        }

        // ── 混响 ──
        function createReverb() {
            const sampleRate = audioCtx.sampleRate;
            const len = Math.floor(sampleRate * 2.2);
            const impulse = audioCtx.createBuffer(2, len, sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = impulse.getChannelData(ch);
                for (let i = 0; i < len; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sampleRate * 0.65));
                }
            }
            const conv = audioCtx.createConvolver();
            conv.buffer = impulse;
            const dry = audioCtx.createGain();
            dry.gain.value = 0.75;
            const wet = audioCtx.createGain();
            wet.gain.value = 0.28;
            return { conv, dry, wet };
        }

        // ── 钢琴旋律（A 小调，约 60 BPM，38 秒循环） ──
        function getMelody() {
            const A2=110, C3=130.81, D3=146.83, F3=174.61, G3=196;
            const A3=220, C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392;
            const B4=493.88, C5=523.25, D5=587.33, E5=659.25, F5=698.46;
            // 和弦走向: Am | F | C | G | Am | F | C G | Am
            return [
                { f: A2, t: 0, d: 5.5 }, { f: A3, t: 0.4, d: 2.2 }, { f: E4, t: 2.3, d: 1.8 },
                { f: F3, t: 4, d: 5.5 }, { f: A3, t: 4.4, d: 2.2 }, { f: F4, t: 6.3, d: 1.8 },
                { f: C3, t: 8, d: 5.5 }, { f: C4, t: 8.3, d: 1.8 }, { f: G4, t: 10, d: 2 },
                { f: G3, t: 12, d: 5.5 }, { f: B4, t: 12.4, d: 1.8 }, { f: D5, t: 14, d: 1.5 },
                { f: A2, t: 16, d: 5.5 }, { f: C5, t: 16.3, d: 2 }, { f: E4, t: 18.3, d: 1.8 },
                { f: F3, t: 20, d: 5.5 }, { f: A3, t: 20.4, d: 2.2 }, { f: C5, t: 22.3, d: 1.5 },
                { f: C3, t: 24, d: 3 }, { f: E4, t: 24.4, d: 1.8 },
                { f: G3, t: 27, d: 3 }, { f: D5, t: 27.4, d: 1.5 }, { f: B4, t: 29, d: 1 },
                { f: A2, t: 30, d: 7 }, { f: A3, t: 30.3, d: 3 }, { f: C5, t: 33, d: 1.8 }, { f: E4, t: 35, d: 2 },
            ];
        }

        function playMelody() {
            if (!audioCtx || !musicPlaying) return;
            const melody = getMelody();
            const now = audioCtx.currentTime;
            const LOOP = 38;
            for (const n of melody) {
                pianoNote(n.f, now + n.t, n.d * 1.0, 0.4);
            }
            melodyTimer = setTimeout(() => playMelody(), LOOP * 1000);
        }

        function stopMelody() {
            if (melodyTimer) { clearTimeout(melodyTimer); melodyTimer = null; }
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext());
            const rev = createReverb();
            musicGainNode = audioCtx.createGain();
            musicGainNode.gain.value = 0.55;
            musicGainNode.connect(rev.dry);
            musicGainNode.connect(rev.conv);
            rev.dry.connect(audioCtx.destination);
            rev.conv.connect(rev.wet);
            rev.wet.connect(audioCtx.destination);
            musicPlaying = true;
            playMelody();
        }

        // ── 星光乍现音效 ──
        function playSparkle() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const sparkNotes = [880, 1046.5, 1318.5, 1568, 2093, 1174.7, 1396.9, 1760];

            for (let i = 0; i < 6; i++) {
                const t = now + i * 0.06;
                const freq = sparkNotes[Math.floor(Math.random() * sparkNotes.length)];

                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.06, t + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + 0.6);
            }
        }

        // ── 宇宙钟鸣（提问时） ──
        function playDeepChime() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const notes = [261.63, 329.63, 392, 523.25]; // C4, E4, G4, C5

            notes.forEach((freq, i) => {
                const t = now + i * 0.18;

                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;

                const osc2 = audioCtx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = freq * 2;
                osc2.detune.value = 3;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.04, t + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);

                const gain2 = audioCtx.createGain();
                gain2.gain.setValueAtTime(0, t);
                gain2.gain.linearRampToValueAtTime(0.015, t + 0.03);
                gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.2);

                osc.connect(gain);
                osc2.connect(gain2);
                gain.connect(audioCtx.destination);
                gain2.connect(audioCtx.destination);
                osc.start(t);
                osc2.start(t);
                osc.stop(t + 1.6);
                osc2.stop(t + 1.4);
            });
        }

        // ── 音乐开关按钮 ──
        let musicToggleEl = null;
        function createMusicToggle() {
            musicToggleEl = document.createElement('button');
            musicToggleEl.id = 'musicToggle';
            musicToggleEl.style.cssText = `
                position: fixed;
                bottom: 24px;
                right: 24px;
                z-index: 200;
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 50%;
                width: 42px;
                height: 42px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: rgba(255,255,255,0.5);
                font-size: 16px;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                transition: all 0.4s ease;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            `;
            musicToggleEl.innerHTML = '🎵';
            musicToggleEl.title = '开启钢琴曲';
            musicToggleEl.addEventListener('click', () => {
                if (!audioCtx) {
                    initAudio();
                    musicToggleEl.innerHTML = '🎹';
                    musicToggleEl.title = '暂停钢琴曲';
                    musicToggleEl.style.color = 'rgba(255,255,255,0.7)';
                } else if (musicPlaying) {
                    musicGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                    musicPlaying = false;
                    stopMelody();
                    musicToggleEl.innerHTML = '🎵';
                    musicToggleEl.title = '开启钢琴曲';
                    musicToggleEl.style.color = 'rgba(255,255,255,0.5)';
                } else {
                    musicGainNode.gain.linearRampToValueAtTime(0.55, audioCtx.currentTime + 0.5);
                    musicPlaying = true;
                    playMelody();
                    musicToggleEl.innerHTML = '🎹';
                    musicToggleEl.title = '暂停钢琴曲';
                    musicToggleEl.style.color = 'rgba(255,255,255,0.7)';
                }
            });
            document.body.appendChild(musicToggleEl);
        }

        // 首次交互自动启动
        function autoStartAudio() {
            if (!audioCtx) {
                initAudio();
                if (musicToggleEl) {
                    musicToggleEl.innerHTML = '🎹';
                    musicToggleEl.title = '暂停钢琴曲';
                    musicToggleEl.style.color = 'rgba(255,255,255,0.7)';
                }
            }
        }

        // ── 歌曲推荐简短音效 ──
        function playSongChime() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            // 简短明亮的 3 音阶
            const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
            notes.forEach((freq, i) => {
                const t = now + i * 0.1;
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.05, t + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + 0.5);
            });
        }

        // ── 歌曲涟漪 ──
        function createSongRipple(btn, e) {
            const ripple = document.createElement('span');
            ripple.className = 'song-ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
        }

        // ═══════════════════════════════════
        //  ●●● 星辰荐歌按钮 ●●●
        // ═══════════════════════════════════
        const songBtn = document.getElementById('songBtn');
        const songResult = document.getElementById('songResult');
        let isSongSearching = false;

        songBtn.addEventListener('click', function(e) {
            if (isSongSearching) return;

            // 取当前输入框的问题作为推荐依据
            const question = questionInput.value.trim();
            const matchedSong = matchSong(question || '迷茫');

            // 按钮涟漪
            createSongRipple(this, e);
            // 简短音效
            playSongChime();

            // 按钮搜索态
            isSongSearching = true;
            songBtn.classList.add('searching-btn');
            songBtn.textContent = '🎧 星辰寻觅中...';
            songResult.classList.remove('show');

            setTimeout(() => {
                const noteText = matchedSong.note ? ` — "${matchedSong.note}"` : '';
                const langLabel = matchedSong.lang === 'zh' ? '♪' : '♫';
                songResult.innerHTML = `${langLabel} <span class="song-name">${matchedSong.title}</span> / ${matchedSong.artist}${noteText}`;
                songResult.classList.add('show');

                songBtn.classList.remove('searching-btn');
                songBtn.textContent = '🎧 星辰荐歌';
                isSongSearching = false;
            }, 800);
        });

        // ═══════════════════════════════════
        //  卡片3D微倾
        // ═══════════════════════════════════
        document.addEventListener('mousemove', function(e) {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;
            card.style.transform = `perspective(800px) rotateX(${dy * -2.5}deg) rotateY(${dx * 2.5}deg)`;
            card.style.transition = 'transform 0.6s ease-out, box-shadow 1.5s ease, border-color 0.8s ease, opacity 0.8s ease';
        });

        // ═══════════════════════════════════
        //  初始化
        // ═══════════════════════════════════
        let startIndex = Math.floor(Math.random() * quotes.length);
        setQuoteContent(startIndex);
        lastAnswerIndex = startIndex;
        entranceAnimation();
        createMusicToggle();

        // 用户首次点击页面时初始化音频并自动播放
        document.addEventListener('click', function initOnClick() {
            initAudio();
        }, { once: true });

        console.log('🌌 宇宙赠言 — 写下一个问题，星辰将为你作答。');
        console.log('💡 试试在右侧输入框中写下你的困惑，然后按回车——');
    </script>
